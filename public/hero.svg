<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#020617"/>

  <!-- Gradients -->
  <defs>
    <radialGradient id="purpleGlow" cx="90%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#310877" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blueGlow" cx="90%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#06308b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="greenGlow" cx="90%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#860646" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b90a82" stop-opacity="0"/>
    </radialGradient>

    <!-- Blur filter -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="80" />
    </filter>
  </defs>

  <!-- Glow shapes -->
  <circle cx="0%" cy="40%" r="700" fill="url(#purpleGlow)" filter="url(#blur)"/>
  <circle cx="5%" cy="90%" r="700" fill="url(#blueGlow)" filter="url(#blur)"/>
  <circle cx="50%" cy="50%" r="500" fill="url(#greenGlow)" filter="url(#blur)"/>

</svg>